<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meti AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- NAVBAR -->

    <header>

        <div class="logo">
            <span>▲</span> meti
        </div>

        <nav>
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Support</a>
            <a href="#">Contact</a>
        </nav>

        <button class="download-btn">
            Download App ↓
        </button>

    </header>

    <!-- HERO SECTION -->

    <section class="hero">

        <!-- LEFT TEXT -->

        <div class="left-content">

            <h1>
                Connect
            </h1>

            <div class="info">

                <div class="play-btn">▶</div>

                <p>
                    AI-powered meetings<br>
                    for smarter collaboration!<br>
                    Easy to use anywhere.
                </p>

            </div>

        </div>

        <!-- CENTER CARD -->

        <div class="center-card">

            <div class="tag">
                Sales AI Assistant
            </div>

            <img
            src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=900"
            alt="profile">

            <div class="small-avatar">

                <img
                src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=300"
                alt="">

                <div class="mic">
                    🎤
                </div>

            </div>

        </div>

        <!-- RIGHT TEXT -->

        <div class="right-content">

            <h1>
                with
                <span>❤</span>
                AI
            </h1>

        </div>

    </section>

    <!-- BOTTOM SECTION -->

    <section class="bottom">

        <!-- PHONE -->

        <div class="phone-card">

            <img
            src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800"
            alt="phone">

        </div>

        <!-- APP CARD -->

        <div class="app-card">

            <h2>
                Discover and join<br>
                New Meti app!
            </h2>

            <button>
                Get for iOS 🍎
            </button>

        </div>

        <!-- USERS -->

        <div class="users-card">

            <div class="avatars">

                <img src="https://randomuser.me/api/portraits/women/11.jpg">

                <img src="https://randomuser.me/api/portraits/women/12.jpg">

            </div>

            <div class="rating">
                5★
            </div>

            <p>
                Dive Into Seamless<br>
                Communication,<br>
                Anytime, Anywhere.
            </p>

        </div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
